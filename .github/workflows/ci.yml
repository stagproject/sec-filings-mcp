name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Syntax check
        run: uv run python -m py_compile mcp_server_finance.py

      - name: MCP smoke test (public Cloud Run)
        run: uv run python test_finance_mcp.py --direct-only
        env:
          MCP_DIRECT_URL: https://sec-filings-mcp-1065601264332.us-central1.run.app/mcp
